<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link href="./style.css" rel="stylesheet">
        <title>todolist</title>
    </head>
    <body>
        <div id="todolist">
            <h1>to-do</h1>
            <table>
                <thead>
                    <tr>
                        <th>date</th>
                        <th>task</th>
                        <th>status</th>
                    </tr>
                </thead>
                <tbody id="newitem">
                    <tr>
                        <td><input type="date" id="date" name="date"></td>
                        <td><input type="text" id="task" name="task"></td>
                        <td><input type="checkbox" id="status" name="status" value="no"></td>
                    </tr>
                </tbody>
                <tbody>
                    <tr>
                        <td>not done</td>
                    </tr>
                </tbody>
                <tbody id="items">
                </tbody>
                <tbody>
                    <tr>
                        <td>done</td>
                    </tr>
                </tbody>
                <tbody id="doneitems">
                </tbody>
            </table>
        </div>
        <script src="./index.js"></script>
    </body>
</html>
